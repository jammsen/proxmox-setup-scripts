# We will use mount-point pass-through to provide models to all LXC containers
# Monitoring snippet:
# watch -d "docker exec ollama-multi-gpu ollama list && echo \"\\nollama-multi-gpu\\n\" && docker exec ollama-multi-gpu ollama ps"
services:
    ollama-multi-gpu:
        container_name: ollama-multi-gpu
        image: ollama/ollama
        restart: unless-stopped
        ports:
            - 11434:11434
        environment:
            - CUDA_VISIBLE_DEVICES
            - OLLAMA_MODELS=/opt/llm-models
            - OLLAMA_NUM_PARALLEL=4
            #- OLLAMA_SCHED_SPREAD=1
            #- OLLAMA_MAX_LOADED_MODELS=3
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities: [gpu]
        volumes:
            - /opt/llm-models:/opt/llm-models
